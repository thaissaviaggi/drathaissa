    if(!patients.find(p=>p.email===email)){
      setPatients(prev=>[...prev,{id:Date.now(),name:nome,email,sent:true,responded:false,rating:null,comment:"",date:new Date().toISOString().slice(0,10)}]);

      <div style={{background:"rgba(255,255,255,0.02)",borderBottom:"1px solid rgba(255,255,255,0.06)",padding:"12px 28px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>

          const b=new Blob([[h,...r].join("\n")],{type:"text/csv"});
          const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="feedbacks.csv";a.click();
        }} style={{padding:"7px 16px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"#94a3b8",cursor:"pointer",fontSize:13}}>↓ Exportar</button>
      </div>

      <div style={{maxWidth:1000,margin:"0 auto",padding:"24px 20px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}}>
          {[{l:"Total",v:patients.length,i:"👥",c:"#3b82f6"},{l:"Enviados",v:patients.filter(p=>p.sent).length,i:"📨",c:"#8b5cf6"},{l:"Respostas",v:patients.filter(p=>p.responded).length,i:"✅",c:"#10b981"},{l:"Nota média",v:avg(patients),i:"⭐",c:"#c9a96e"}].map((s,i)=>(
            <div key={i} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:"16px 18px"}}>
              <div style={{fontSize:20,marginBottom:6}}>{s.i}</div>
              <div style={{fontSize:24,fontWeight:700,color:s.c}}>{s.v}</div>
              <div style={{fontSize:11,color:"#475569",marginTop:3}}>{s.l}</div>
            </div>
          ))}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:24}}>
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:20}}>
            <h3 style={{margin:"0 0 14px",fontSize:12,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",letterSpacing:".06em"}}>Enviar para paciente</h3>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <input value={nome} onChange={e=>setNome(e.target.value)} placeholder="Nome do paciente"
                style={{padding:"9px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",color:"#e2e8f0",fontSize:13,outline:"none"}}/>
              <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="E-mail do paciente"
                style={{padding:"9px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",color:"#e2e8f0",fontSize:13,outline:"none"}}/>
              <select value={guiaSel||""} onChange={e=>{setGuiaSel(e.target.value||null);setSecsSel([])}}
                style={{padding:"9px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.08)",background:"#0d1f35",color:guiaSel?"#e2e8f0":"#475569",fontSize:13,outline:"none"}}>
                <option value="">— Diagnóstico (opcional) —</option>
                {guias.map(g=><option key={g.id} value={g.id}>{g.nome}</option>)}
              </select>
              {guiaAtual&&(
                <div style={{background:"rgba(201,169,110,0.05)",border:"1px solid rgba(201,169,110,0.15)",borderRadius:10,padding:12}}>
                  <div style={{fontSize:11,color:"#c9a96e",marginBottom:8,textTransform:"uppercase",letterSpacing:".05em"}}>Seções para o PDF</div>
                  {guiaAtual.secoes.map(s=>(
                    <label key={s.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,cursor:"pointer"}}>
                      <input type="checkbox" checked={secsSel.includes(s.id)}
                        onChange={()=>setSecsSel(prev=>prev.includes(s.id)?prev.filter(x=>x!==s.id):[...prev,s.id])}
                        style={{accentColor:"#c9a96e"}}/>
                      <span style={{fontSize:12,color:"#cbd5e1"}}>{s.nome}</span>
                    </label>
                  ))}
                  {secsSel.length>0&&(
                    <button onClick={()=>{
                      const secs=guiaAtual.secoes.filter(s=>secsSel.includes(s.id));
                      gerarPDF(nome||"Paciente",guiaAtual.nome,secs);
                      showToast("✓ Abrindo PDF...");
                    }} style={{width:"100%",marginTop:8,padding:"8px",borderRadius:8,border:"none",background:"linear-gradient(135deg,rgba(201,169,110,0.9),rgba(160,120,64,0.9))",color:"#0d1f35",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                      📄 Gerar PDF das orientações
                    </button>
                  )}
                </div>
              )}
              <button onClick={gerarEmail} disabled={!nome.trim()||!email.trim()}
                style={{padding:"10px",borderRadius:8,border:"none",background:nome&&email?"linear-gradient(135deg,#3b82f6,#6366f1)":"rgba(255,255,255,0.05)",color:nome&&email?"#fff":"#374151",cursor:nome&&email?"pointer":"not-allowed",fontSize:13,fontWeight:500}}>
                ✉ Gerar e-mail de avaliação
              </button>
            </div>
            {genEmail&&(
              <div style={{marginTop:14,background:"rgba(59,130,246,0.08)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:10,padding:14}}>
                <p style={{fontSize:12,color:"#93c5fd",margin:"0 0 10px"}}>📧 E-mail gerado para <strong>{genEmail.name}</strong></p>
                <div style={{background:"rgba(201,169,110,0.1)",border:"1px solid rgba(201,169,110,0.3)",borderRadius:8,padding:"8px 12px",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:16}}>📎</span>
                  <span style={{fontSize:12,color:"#c9a96e",lineHeight:1.4}}>Não esqueça de anexar o PDF das orientações antes de enviar!</span>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <a href={genEmail.mailto} style={{flex:1,textAlign:"center",padding:"8px",borderRadius:7,background:"linear-gradient(135deg,#0ea5e9,#3b82f6)",color:"#fff",textDecoration:"none",fontSize:12,fontWeight:500}}>📨 Abrir no Gmail</a>
                  <button onClick={envioFeito} style={{flex:1,padding:"8px",borderRadius:7,border:"1px solid rgba(16,185,129,0.3)",background:"rgba(16,185,129,0.1)",color:"#10b981",cursor:"pointer",fontSize:12}}>✓ Já enviei</button>
                </div>
              </div>
            )}
          </div>

          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:20,display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
            <div>
              <h3 style={{margin:"0 0 10px",fontSize:12,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",letterSpacing:".06em"}}>Página do paciente</h3>
              <p style={{color:"#475569",fontSize:12,lineHeight:1.6,margin:0}}>Visualize como o paciente vê a página de avaliação — personalizada com o nome e identidade visual da clínica.</p>
            </div>
            <div>
              <input value={nome||"Ana Lima"} readOnly style={{width:"100%",padding:"8px 12px",borderRadius:7,border:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.03)",color:"#64748b",fontSize:12,boxSizing:"border-box",marginBottom:8}}/>
              <button onClick={()=>{setPreview({name:nome||"Ana Lima"});setView("r")}}
                style={{width:"100%",padding:"10px",borderRadius:8,border:"1px solid rgba(201,169,110,0.25)",background:"rgba(201,169,110,0.06)",color:"#c9a96e",cursor:"pointer",fontSize:13}}>
                👁 Visualizar página de avaliação
              </button>
            </div>
          </div>
        </div>

        <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,overflow:"hidden"}}>
          <div style={{padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <h3 style={{margin:0,fontSize:12,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",letterSpacing:".06em"}}>Pacientes</h3>
            <div style={{display:"flex",gap:4}}>
              {[["all","Todos"],["responded","Responderam"],["pending","Aguardando"],["unsent","Não enviado"]].map(([v,l])=>(
                <button key={v} onClick={()=>setFiltro(v)} style={{padding:"4px 10px",borderRadius:20,border:"none",fontSize:11,cursor:"pointer",background:filtro===v?"rgba(59,130,246,0.2)":"transparent",color:filtro===v?"#93c5fd":"#475569"}}>{l}</button>
              ))}
            </div>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                {["Paciente","Status","Nota","Comentário","Data",""].map(h=>(
                  <th key={h} style={{padding:"10px 18px",textAlign:"left",fontSize:10,color:"#334155",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {displayed.map(p=>(
                <tr key={p.id} style={{borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                  <td style={{padding:"12px 18px"}}><div style={{fontSize:13,fontWeight:500,color:"#e2e8f0"}}>{p.name}</div><div style={{fontSize:11,color:"#334155"}}>{p.email}</div></td>
                  <td style={{padding:"12px 18px"}}><span style={{padding:"3px 9px",borderRadius:20,fontSize:10,fontWeight:500,background:p.responded?"rgba(16,185,129,0.1)":p.sent?"rgba(245,158,11,0.1)":"rgba(71,85,105,0.2)",color:p.responded?"#10b981":p.sent?"#f59e0b":"#475569"}}>{p.responded?"✓ Respondeu":p.sent?"⏳ Aguardando":"Não enviado"}</span></td>
                  <td style={{padding:"12px 18px"}}>{p.rating?<div style={{display:"flex",gap:2}}>{[1,2,3,4,5].map(n=><span key={n} style={{fontSize:13,color:n<=p.rating?"#c9a96e":"rgba(255,255,255,0.1)"}}>★</span>)}</div>:<span style={{color:"#1e293b"}}>—</span>}</td>
                  <td style={{padding:"12px 18px",maxWidth:180}}><span style={{fontSize:12,color:"#64748b",display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.comment||"—"}</span></td>
                  <td style={{padding:"12px 18px"}}><span style={{fontSize:11,color:"#334155"}}>{p.date||"—"}</span></td>
                  <td style={{padding:"12px 18px"}}><button onClick={()=>{setPreview(p);setView("r")}} style={{padding:"4px 10px",borderRadius:6,border:"1px solid rgba(255,255,255,0.06)",background:"transparent",color:"#475569",cursor:"pointer",fontSize:11}}>Ver página</button></td>
                </tr>
              ))}
            </tbody>
          </table>
          {displayed.length===0&&<div style={{padding:36,textAlign:"center",color:"#334155",fontSize:13}}>Nenhum paciente neste filtro.</div>}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
